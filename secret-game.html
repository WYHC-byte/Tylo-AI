<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TyloAI太空射击游戏</title>
    
    <!-- PWA 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TyloAI太空游戏">
    <meta name="theme-color" content="#0a0a2e">
    <meta name="description" content="TyloAI-Epist-4.5 制作的精美太空射击游戏">
    
    <!-- PWA 图标 -->
    <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgdmlld0JveD0iMCAwIDE4MCAxODAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIiBmaWxsPSJ1cmwoI2dyYWRpZW50KSIgcng9IjMwIi8+CjxkZWZzPgo8bGluZWFyR3JhZGllbnQgaWQ9ImdyYWRpZW50IiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj4KPHN0b3Agb2Zmc2V0PSIwJSIgc3RvcC1jb2xvcj0iIzBhMGEyZSIvPgo8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiMxNjIxM2UiLz4KPC9saW5lYXJHcmFkaWVudD4KPC9kZWZzPgo8cG9seWdvbiBwb2ludHM9IjkwLDUwIDcwLDEyMCA5MCwxMTAgMTEwLDEyMCIgZmlsbD0iY3lhbiIvPgo8L3N2Zz4=">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a2e 0%, #16213e 30%, #0f3460 60%, #1a1a3e 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            height: 100vh;
            height: 100dvh; /* 动态视口高度 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 动态背景星云效果 */
        @keyframes nebula1 {
            0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(180deg); opacity: 0.6; }
        }

        @keyframes nebula2 {
            0%, 100% { transform: translate(-50%, -50%) scale(1.1) rotate(360deg); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(0.9) rotate(180deg); opacity: 0.2; }
        }

        body::before, body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background: radial-gradient(circle, rgba(120, 119, 198, 0.4) 0%, transparent 70%);
            top: 20%;
            left: 30%;
            animation: nebula1 20s ease-in-out infinite;
        }

        body::after {
            background: radial-gradient(circle, rgba(255, 119, 198, 0.3) 0%, transparent 70%);
            top: 60%;
            left: 70%;
            animation: nebula2 25s ease-in-out infinite;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        #gameCanvas {
            background: rgba(10, 10, 46, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 80px rgba(120, 119, 198, 0.3),
                inset 0 0 80px rgba(255, 255, 255, 0.05);
        }

        /* 伪灵动岛效果 - 仅iPhone Safari */
        #dynamicIsland {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 25px;
            backdrop-filter: blur(15px);
            display: none;
            z-index: 1000;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #dynamicIsland.show {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: islandPulse 2s ease-in-out infinite;
        }

        @keyframes islandPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(120, 119, 198, 0.3); }
            50% { box-shadow: 0 0 30px rgba(120, 119, 198, 0.6); }
        }

        #islandContent {
            color: white;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            opacity: 0.9;
        }

        #ui {
            position: absolute;
            top: 60px;
            left: 30px;
            color: white;
            font-size: 20px;
            z-index: 100;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 600;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 200;
            background: rgba(10, 10, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 2px solid rgba(255, 107, 107, 0.6);
            box-shadow: 
                0 0 50px rgba(255, 107, 107, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.05);
            display: none;
            min-width: 300px;
        }

        #gameOver h2 {
            font-size: 32px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a52, #ff8a80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #branding {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52, #ff8a80);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            margin: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 25px rgba(255, 107, 107, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 12px 35px rgba(255, 107, 107, 0.6),
                inset 0 0 25px rgba(255, 255, 255, 0.2);
        }

        .button:active {
            transform: translateY(-1px) scale(1.02);
        }

        #instructions {
            position: absolute;
            top: 60px;
            right: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-align: right;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            #ui {
                font-size: 18px;
                top: 80px;
                left: 20px;
            }
            #instructions {
                font-size: 12px;
                top: 80px;
                right: 20px;
                padding: 12px 16px;
            }
            .button {
                padding: 12px 24px;
                font-size: 16px;
            }
            #gameOver {
                padding: 30px 20px;
                min-width: 280px;
            }
            #dynamicIsland.show {
                display: flex;
            }
        }

        /* 流星雨效果 */
        @keyframes shootingStar {
            0% { 
                transform: translateX(-100px) translateY(-100px);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateX(calc(100vw + 100px)) translateY(calc(100vh + 100px));
                opacity: 0;
            }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: shootingStar 3s linear infinite;
            box-shadow: 0 0 10px white;
        }
    </style>
</head>
<body>
    <!-- 伪灵动岛 -->
    <div id="dynamicIsland">
        <div id="islandContent">🚀 得分: <span id="islandScore">0</span></div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div style="display: flex; align-items: center; margin-bottom: 8px;">
                <svg width="20" height="20" style="margin-right: 8px;">
                    <polygon points="10,2 8,18 10,16 12,18" fill="gold" stroke="orange" stroke-width="1"/>
                </svg>
                得分: <span id="score">0</span>
            </div>
            <div style="display: flex; align-items: center;">
                <svg width="20" height="20" style="margin-right: 8px;">
                    <circle cx="10" cy="10" r="8" fill="red" stroke="darkred" stroke-width="1"/>
                    <text x="10" y="14" text-anchor="middle" fill="white" font-size="10">♥</text>
                </svg>
                生命: <span id="lives">3</span>
            </div>
        </div>

        <div id="instructions">
            <div style="margin-bottom: 8px;">🖥️ 电脑: WASD移动, 空格射击</div>
            <div>📱 手机: 触摸控制</div>
        </div>

        <div id="gameOver">
            <h2>🎮 游戏结束!</h2>
            <p style="font-size: 18px; margin: 20px 0;">最终得分: <span id="finalScore">0</span></p>
            <button class="button" onclick="restartGame()">🚀 重新开始</button>
        </div>

        <div id="branding">
            ✨ Powered by TyloAI-Epist-4.5
        </div>
    </div>

    <!-- 流星雨背景效果 -->
    <div class="shooting-star" style="top: 10%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 20%; animation-delay: 1s;"></div>
    <div class="shooting-star" style="top: 30%; animation-delay: 2s;"></div>

    <script>
        // 检测iPhone Safari并启用灵动岛
        function detectiPhoneSafari() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
            return isIOS && isSafari;
        }

        if (detectiPhoneSafari()) {
            document.getElementById('dynamicIsland').classList.add('show');
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置canvas尺寸
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const maxWidth = Math.min(window.innerWidth - 40, 900);
            const maxHeight = Math.min(window.innerHeight - 100, 700);
            
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // SVG图形缓存
        const svgCache = new Map();

        function createSVGElement(svgString, width, height) {
            const key = svgString + width + height;
            if (svgCache.has(key)) {
                return svgCache.get(key);
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            const blob = new Blob([svgString], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            
            return new Promise((resolve) => {
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, width, height);
                    URL.revokeObjectURL(url);
                    svgCache.set(key, canvas);
                    resolve(canvas);
                };
                img.src = url;
            });
        }

        // 精美的SVG飞船
        const playerShipSVG = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
                <defs>
                    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge> 
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <polygon points="20,5 10,30 20,25 30,30" fill="url(#shipGrad)" filter="url(#glow)" stroke="cyan" stroke-width="1"/>
                <circle cx="20" cy="20" r="3" fill="white" opacity="0.8"/>
            </svg>
        `;

        // 精美的SVG敌人
        const enemyShipSVG = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30">
                <defs>
                    <linearGradient id="enemyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff4757;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ff3742;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <polygon points="15,25 5,5 15,10 25,5" fill="url(#enemyGrad)" stroke="red" stroke-width="1"/>
                <circle cx="10" cy="8" r="2" fill="red" opacity="0.8"/>
                <circle cx="20" cy="8" r="2" fill="red" opacity="0.8"/>
            </svg>
        `;

        // 游戏状态
        let gameState = {
            player: {
                x: 0,
                y: 0,
                width: 40,
                height: 40,
                speed: 6
            },
            bullets: [],
            enemies: [],
            particles: [],
            score: 0,
            lives: 3,
            gameRunning: true,
            keys: {},
            lastEnemySpawn: 0,
            lastShot: 0,
            playerShipCanvas: null,
            enemyShipCanvas: null
        };

        // 初始化SVG图形
        async function initializeSVGs() {
            gameState.playerShipCanvas = await createSVGElement(playerShipSVG, 40, 40);
            gameState.enemyShipCanvas = await createSVGElement(enemyShipSVG, 30, 30);
            
            // 设置初始玩家位置
            gameState.player.x = canvas.width / 2;
            gameState.player.y = canvas.height - 80;
        }

        // 输入处理
        document.addEventListener('keydown', (e) => {
            gameState.keys[e.key.toLowerCase()] = true;
            e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            gameState.keys[e.key.toLowerCase()] = false;
            e.preventDefault();
        });

        // 触摸控制
        let touchStartX = 0;
        let touchStartY = 0;
        let isTouching = false;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchStartX = touch.clientX - rect.left;
            touchStartY = touch.clientY - rect.top;
            isTouching = true;
            
            // 触摸射击
            if (Date.now() - gameState.lastShot > 150) {
                shoot();
                gameState.lastShot = Date.now();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isTouching) return;
            
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;
            
            gameState.player.x = Math.max(20, Math.min(canvas.width - 20, touchX));
            gameState.player.y = Math.max(20, Math.min(canvas.height - 20, touchY));
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isTouching = false;
        });

        // 游戏对象类
        class Bullet {
            constructor(x, y, isPlayerBullet = true) {
                this.x = x;
                this.y = y;
                this.width = isPlayerBullet ? 6 : 5;
                this.height = isPlayerBullet ? 15 : 12;
                this.speed = isPlayerBullet ? -10 : 5;
                this.isPlayerBullet = isPlayerBullet;
                this.hue = isPlayerBullet ? 180 : 0;
                this.time = 0;
            }

            update() {
                this.y += this.speed;
                this.hue += 3;
                this.time += 0.2;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 子弹尾迹效果
                const gradient = ctx.createLinearGradient(0, -this.height/2, 0, this.height/2);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 80%, 1)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 60%, 0.3)`);
                
                // 发光效果
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                
                // 子弹主体（菱形）
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(0, -this.height/2);
                ctx.lineTo(this.width/2, 0);
                ctx.lineTo(0, this.height/2);
                ctx.lineTo(-this.width/2, 0);
                ctx.closePath();
                ctx.fill();
                
                // 内部高光
                ctx.shadowBlur = 0;
                ctx.fillStyle = `hsla(${this.hue}, 100%, 90%, 0.7)`;
                ctx.beginPath();
                ctx.ellipse(0, -this.height/4, this.width/4, this.height/6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }

            isOffScreen() {
                return this.y < -30 || this.y > canvas.height + 30;
            }
        }

        class Enemy {
            constructor() {
                this.x = Math.random() * (canvas.width - 50) + 25;
                this.y = -40;
                this.width = 30;
                this.height = 30;
                this.speed = Math.random() * 2 + 1.5;
                this.hue = Math.random() * 60 + 300;
                this.lastShot = 0;
                this.oscillation = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speed;
                this.x += Math.sin(this.oscillation) * 0.5;
                this.oscillation += 0.02;
                this.hue += 1;
                
                // 敌人射击
                if (Date.now() - this.lastShot > 1200 + Math.random() * 2000) {
                    gameState.bullets.push(new Bullet(this.x, this.y + this.height/2, false));
                    this.lastShot = Date.now();
                }
            }

            draw() {
                if (!gameState.enemyShipCanvas) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 发光效果
                ctx.shadowBlur = 25;
                ctx.shadowColor = `hsl(${this.hue}, 80%, 50%)`;
                
                // 绘制敌人飞船
                ctx.drawImage(gameState.enemyShipCanvas, -this.width/2, -this.height/2, this.width, this.height);
                
                ctx.restore();
            }

            isOffScreen() {
                return this.y > canvas.height + 50;
            }
        }

        class Particle {
            constructor(x, y, color, type = 'explosion') {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.decay = Math.random() * 0.04 + 0.02;
                this.size = Math.random() * 6 + 2;
                this.color = color || `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.type = type;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.size *= 0.97;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                if (this.type === 'star') {
                    // 星形粒子
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * Math.PI * 2) / 5;
                        const x = Math.cos(angle) * this.size;
                        const y = Math.sin(angle) * this.size;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // 圆形粒子
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = this.color;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }

            isDead() {
                return this.life <= 0 || this.size <= 0.5;
            }
        }

        // 游戏功能
        function shoot() {
            if (!gameState.gameRunning) return;
            gameState.bullets.push(new Bullet(gameState.player.x, gameState.player.y - 20));
            
            // 射击粒子效果
            for (let i = 0; i < 8; i++) {
                gameState.particles.push(new Particle(
                    gameState.player.x + (Math.random() - 0.5) * 20, 
                    gameState.player.y - 10, 
                    'hsl(180, 100%, 70%)',
                    'star'
                ));
            }
        }

        function spawnEnemy() {
            if (Date.now() - gameState.lastEnemySpawn > Math.max(800, 2000 - gameState.score/100)) {
                gameState.enemies.push(new Enemy());
                gameState.lastEnemySpawn = Date.now();
            }
        }

        function checkCollisions() {
            // 玩家子弹击中敌人
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                if (!bullet.isPlayerBullet) continue;
                
                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    const enemy = gameState.enemies[j];
                    if (bullet.x < enemy.x + enemy.width/2 &&
                        bullet.x + bullet.width > enemy.x - enemy.width/2 &&
                        bullet.y < enemy.y + enemy.height/2 &&
                        bullet.y + bullet.height > enemy.y - enemy.height/2) {
                        
                        // 豪华爆炸效果
                        for (let k = 0; k < 20; k++) {
                            gameState.particles.push(new Particle(
                                enemy.x + (Math.random() - 0.5) * 30, 
                                enemy.y + (Math.random() - 0.5) * 30, 
                                `hsl(${Math.random() * 60 + 20}, 100%, 60%)`,
                                Math.random() > 0.5 ? 'star' : 'explosion'
                            ));
                        }
                        
                        gameState.bullets.splice(i, 1);
                        gameState.enemies.splice(j, 1);
                        gameState.score += 100;
                        
                        // 更新灵动岛分数
                        updateDynamicIsland();
                        break;
                    }
                }
            }

            // 敌人子弹击中玩家
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                if (bullet.isPlayerBullet) continue;
                
                if (bullet.x < gameState.player.x + gameState.player.width/2 &&
                    bullet.x + bullet.width > gameState.player.x - gameState.player.width/2 &&
                    bullet.y < gameState.player.y + gameState.player.height/2 &&
                    bullet.y + bullet.height > gameState.player.y - gameState.player.height/2) {
                    
                    gameState.bullets.splice(i, 1);
                    gameState.lives--;
                    
                    // 受伤效果
                    for (let k = 0; k < 15; k++) {
                        gameState.particles.push(new Particle(
                            gameState.player.x + (Math.random() - 0.5) * 40, 
                            gameState.player.y + (Math.random() - 0.5) * 40, 
                            'hsl(0, 100%, 70%)',
                            'explosion'
                        ));
                    }
                    
                    if (gameState.lives <= 0) {
                        endGame();
                    }
                }
            }

            // 敌人撞击玩家
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                const distance = Math.sqrt(
                    Math.pow(enemy.x - gameState.player.x, 2) + 
                    Math.pow(enemy.y - gameState.player.y, 2)
                );
                
                if (distance < 25) {
                    gameState.enemies.splice(i, 1);
                    gameState.lives--;
                    
                    for (let k = 0; k < 25; k++) {
                        gameState.particles.push(new Particle(
                            gameState.player.x + (Math.random() - 0.5) * 50, 
                            gameState.player.y + (Math.random() - 0.5) * 50, 
                            `hsl(${Math.random() * 60}, 100%, 60%)`,
                            Math.random() > 0.7 ? 'star' : 'explosion'
                        ));
                    }
                    
                    if (gameState.lives <= 0) {
                        endGame();
                    }
                }
            }
        }

        function updatePlayer() {
            if (!gameState.gameRunning) return;
            
            const speed = gameState.player.speed;
            
            if (gameState.keys['a'] || gameState.keys['arrowleft']) {
                gameState.player.x = Math.max(20, gameState.player.x - speed);
            }
            if (gameState.keys['d'] || gameState.keys['arrowright']) {
                gameState.player.x = Math.min(canvas.width - 20, gameState.player.x + speed);
            }
            if (gameState.keys['w'] || gameState.keys['arrowup']) {
                gameState.player.y = Math.max(20, gameState.player.y - speed);
            }
            if (gameState.keys['s'] || gameState.keys['arrowdown']) {
                gameState.player.y = Math.min(canvas.height - 20, gameState.player.y + speed);
            }
            
            if (gameState.keys[' '] && Date.now() - gameState.lastShot > 150) {
                shoot();
                gameState.lastShot = Date.now();
            }
        }

        function drawPlayer() {
            if (!gameState.playerShipCanvas) return;
            
            ctx.save();
            
            // 玩家飞船引擎尾焰
            ctx.translate(gameState.player.x, gameState.player.y + 25);
            const flameHeight = 15 + Math.sin(Date.now() * 0.02) * 5;
            const gradient = ctx.createLinearGradient(0, 0, 0, flameHeight);
            gradient.addColorStop(0, 'rgba(255, 100, 0, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 200, 0, 0.6)');
            gradient.addColorStop(1, 'rgba(255, 255, 100, 0.2)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(0, flameHeight/2, 8, flameHeight/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // 绘制玩家飞船
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'cyan';
            ctx.drawImage(
                gameState.playerShipCanvas, 
                gameState.player.x - gameState.player.width/2, 
                gameState.player.y - gameState.player.height/2,
                gameState.player.width,
                gameState.player.height
            );
            ctx.restore();
        }

        function drawBackground() {
            // 动态星空
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let i = 0; i < 150; i++) {
                const x = (i * 17) % canvas.width;
                const y = (i * 23 + Date.now() * 0.05) % (canvas.height + 100);
                const size = Math.sin(i + Date.now() * 0.003) * 1.5 + 1.5;
                const twinkle = Math.sin(i * 2 + Date.now() * 0.01) * 0.5 + 0.5;
                
                ctx.save();
                ctx.globalAlpha = twinkle;
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'white';
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            // 远景行星
            ctx.save();
            ctx.globalAlpha = 0.3;
            const planetX = canvas.width * 0.8;
            const planetY = canvas.height * 0.3;
            const planetGradient = ctx.createRadialGradient(planetX-20, planetY-20, 0, planetX, planetY, 60);
            planetGradient.addColorStop(0, 'rgba(100, 150, 255, 0.8)');
            planetGradient.addColorStop(1, 'rgba(50, 80, 150, 0.2)');
            ctx.fillStyle = planetGradient;
            ctx.beginPath();
            ctx.arc(planetX, planetY, 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function updateDynamicIsland() {
            if (detectiPhoneSafari()) {
                const islandScore = document.getElementById('islandScore');
                if (islandScore) {
                    islandScore.textContent = gameState.score;
                    
                    // 分数增加动画
                    const island = document.getElementById('dynamicIsland');
                    island.style.animation = 'none';
                    setTimeout(() => {
                        island.style.animation = 'islandPulse 2s ease-in-out infinite';
                    }, 50);
                }
            }
        }

        function updateGame() {
            if (!gameState.gameRunning) return;
            
            updatePlayer();
            spawnEnemy();
            
            // 更新子弹
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                bullet.update();
                if (bullet.isOffScreen()) {
                    gameState.bullets.splice(i, 1);
                }
            }
            
            // 更新敌人
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                enemy.update();
                if (enemy.isOffScreen()) {
                    gameState.enemies.splice(i, 1);
                }
            }
            
            // 更新粒子
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const particle = gameState.particles[i];
                particle.update();
                if (particle.isDead()) {
                    gameState.particles.splice(i, 1);
                }
            }
            
            // 随机生成背景粒子
            if (Math.random() < 0.1) {
                gameState.particles.push(new Particle(
                    Math.random() * canvas.width,
                    canvas.height + 10,
                    `hsl(${Math.random() * 60 + 200}, 70%, 60%)`,
                    'star'
                ));
            }
            
            checkCollisions();
            updateUI();
        }

        function drawGame() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            drawBackground();
            
            // 绘制游戏对象
            drawPlayer();
            
            gameState.bullets.forEach(bullet => bullet.draw());
            gameState.enemies.forEach(enemy => enemy.draw());
            gameState.particles.forEach(particle => particle.draw());
        }

        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = gameState.lives;
        }

        function endGame() {
            gameState.gameRunning = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'block';
            
            // 最终爆炸效果
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    gameState.particles.push(new Particle(
                        Math.random() * canvas.width,
                        Math.random() * canvas.height,
                        `hsl(${Math.random() * 360}, 80%, 60%)`,
                        Math.random() > 0.5 ? 'star' : 'explosion'
                    ));
                }, i * 50);
            }
        }

        function restartGame() {
            // 重置游戏状态
            gameState.bullets = [];
            gameState.enemies = [];
            gameState.particles = [];
            gameState.score = 0;
            gameState.lives = 3;
            gameState.gameRunning = true;
            gameState.lastEnemySpawn = 0;
            gameState.lastShot = 0;
            gameState.player.x = canvas.width / 2;
            gameState.player.y = canvas.height - 80;
            
            document.getElementById('gameOver').style.display = 'none';
            updateDynamicIsland();
        }

        // 游戏循环
        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        // 初始化并启动游戏
        initializeSVGs().then(() => {
            gameLoop();
            updateDynamicIsland();
        });

        // PWA 支持
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", e => e.respondWith(fetch(e.request)))');
        }
    </script>
</body>
</html>
