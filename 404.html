<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", sans-serif;
            color: #fff;
            background: url('404.jpg') no-repeat center top;
            background-size: 100% auto;
            min-height: 100vh;
            height: 200vh; /* 根据图片实际比例调整 */
        }
        
        .fixed-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10;
            padding: 20px;
        }
        
        h1 {
            font-size: 5em;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
        }
        
        p {
            font-size: 1.1em;
            margin: 8px 0;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            max-width: 90%;
        }
        
        .mission {
            font-size: 0.9em;
            margin: 20px 0;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 8px;
            max-width: 600px;
        }
        
        .buttons {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        a {
            display: inline-block;
            padding: 12px 25px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
            min-width: 160px;
        }
        
        a:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            font-size: 0.9em;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="fixed-content">
        <h1>404</h1>
        <p>抱歉，您访问的页面不存在</p>
        <p>请滚动查看背景中的失踪儿童信息</p>
        
        <div class="mission">
            JorkAI 一直致力于"用户为本，科技向善"的号召，<br>
            自发组织成立开展404公益计划、无障碍产品推动等，<br>
            结合产品与技术平台，持续开展公益帮扶行动。
        </div>
        
        <div class="buttons">
            <a onclick="window.history.back()">返回上一页</a>
            <a href="https://www.baobeihuijia.com/" target="_blank">帮助寻人</a>
        </div>
        
        <div class="scroll-hint">
            ↓ 滑动查看背景信息 ↓
        </div>
    </div>
    
    <script>
        // 返回上一页的备用方案
        document.querySelector('a[onclick]').addEventListener('click', function(e) {
            if(window.history.length <= 1) {
                e.preventDefault();
                window.location.href = '/'; // 如果无历史记录则返回首页
            }
        });
    </script>
</body>
</html>
