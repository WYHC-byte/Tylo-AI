<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JorkAI聊天界面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        .sidebar {
            transition: all 0.3s ease;
            opacity: 1;
        }
        .sidebar.hidden {
            transform: translateX(-100%);
            opacity: 0;
        }
        
        .thinking-container {
            border-left: 3px solid #5D5CDE;
            padding-left: 1rem;
            margin: 1rem 0;
            position: relative;
        }
        
        .thinking-step {
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s forwards;
        }
        
        .typing-animation::after {
            content: "";
            display: inline-block;
            width: 0.5em;
            animation: typing 1.5s infinite;
        }
        
        /* Custom dropdown styling */
        .custom-dropdown {
            position: relative;
            user-select: none;
        }
        
        .dropdown-selected {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        .dark .dropdown-selected {
            background-color: rgba(31, 41, 55, 0.8);
            border-color: #374151;
            color: #e2e8f0;
        }
        
        .dropdown-selected:hover {
            border-color: #5D5CDE;
        }
        
        .dropdown-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 0.25rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 10;
            opacity: 0;
            transform: translateY(-10px);
            visibility: hidden;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        
        .dark .dropdown-options {
            background-color: #1F2937;
            border-color: #374151;
        }
        
        .dropdown-options.open {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
        
        .dropdown-option {
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .dropdown-option:hover {
            background-color: #EEF2FF;
        }
        
        .dark .dropdown-option:hover {
            background-color: #374151;
        }
        
        .dropdown-option.selected {
            background-color: #EEF2FF;
            color: #5D5CDE;
        }
        
        .dark .dropdown-option.selected {
            background-color: #2D3748;
            color: #81E6D9;
        }
        
        @keyframes typing {
            0%, 100% { content: ""; }
            25% { content: "."; }
            50% { content: ".."; }
            75% { content: "..."; }
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .code-block {
            background-color: #f0f0f0;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            position: relative;
            overflow-x: auto;
        }
        
        .dark .code-block {
            background-color: #1E293B;
        }
        
        .copy-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.25rem;
            cursor: pointer;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        
        table, th, td {
            border: 1px solid #e2e8f0;
        }
        
        .dark table, .dark th, .dark td {
            border-color: #374151;
        }
        
        th, td {
            padding: 0.5rem;
            text-align: left;
        }
        
        th {
            background-color: #f8fafc;
        }
        
        .dark th {
            background-color: #1E293B;
        }
        
        .file-preview {
            display: flex;
            align-items: center;
            background-color: #f3f4f6;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin: 0.5rem 0;
            max-width: 100%;
        }
        
        .dark .file-preview {
            background-color: #374151;
        }
        
        .file-icon {
            font-size: 1.5rem;
            margin-right: 0.75rem;
            color: #5D5CDE;
        }
        
        .file-info {
            flex-grow: 1;
            overflow: hidden;
        }
        
        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        
        .file-size {
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .dark .file-size {
            color: #9ca3af;
        }
        
        .file-remove {
            color: #ef4444;
            cursor: pointer;
            padding: 0.25rem;
        }
        
        /* Chat history item styling */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .chat-item:hover {
            background-color: #f3f4f6;
            border-left-color: #5D5CDE;
        }
        
        .dark .chat-item:hover {
            background-color: #374151;
        }
        
        .chat-item-icon {
            margin-right: 0.75rem;
            color: #5D5CDE;
        }
        
        .chat-item-content {
            flex-grow: 1;
            overflow: hidden;
        }
        
        .chat-item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-item-time {
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .dark .chat-item-time {
            color: #9ca3af;
        }

        .chat-item-actions {
            display: flex;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chat-item:hover .chat-item-actions {
            opacity: 1;
        }

        .chat-item-delete {
            color: #ef4444;
            cursor: pointer;
            padding: 0.25rem;
            margin-left: 0.5rem;
        }
        
        .user-message-container {
            background-color: #f3f4f6;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .dark .user-message-container {
            background-color: #2d3748;
        }
        
        /* Markdown typography improvements */
        .markdown-content h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .dark .markdown-content h1 {
            border-color: #4b5563;
        }
        
        .markdown-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.4rem;
            margin-bottom: 0.7rem;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .dark .markdown-content h2 {
            border-color: #4b5563;
        }
        
        .markdown-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 1.3rem;
            margin-bottom: 0.65rem;
        }
        
        .markdown-content h4 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 1.2rem;
            margin-bottom: 0.6rem;
        }
        
        .markdown-content h5 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 1.1rem;
            margin-bottom: 0.55rem;
        }
        
        .markdown-content h6 {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .markdown-content p {
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        
        .markdown-content li {
            margin-bottom: 0.5rem;
        }
        
        .markdown-content blockquote {
            border-left: 4px solid #e2e8f0;
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1rem;
            color: #4b5563;
        }
        
        .dark .markdown-content blockquote {
            border-color: #4b5563;
            color: #9ca3af;
        }
        
        /* Typing animation */
        .ai-typing {
            display: inline-block;
            position: relative;
            min-height: 20px;
            width: 60px;
        }
        
        .ai-typing::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 16px;
            background-color: #5D5CDE;
            animation: typing-cursor 0.8s infinite;
            margin-left: 4px;
        }
        
        @keyframes typing-cursor {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        /* Quota warning */
        .quota-warning {
            background-color: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .dark .quota-warning {
            background-color: #78350f;
            border-color: #f59e0b;
            color: #fef3c7;
        }
        
        .quota-warning-icon {
            color: #f59e0b;
            margin-right: 0.5rem;
            font-size: 1.25rem;
        }
        
        .current-chat-title {
            margin-left: 1rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .dark\:bg-gray-900 {
                background-color: #181818;
            }
            .dark\:text-white {
                color: #FFFFFF;
            }
            .dark\:border-gray-700 {
                border-color: #374151;
            }
            .dark\:bg-gray-800 {
                background-color: #1F2937;
            }
            .dark\:hover\:bg-gray-700:hover {
                background-color: #374151;
            }
            .dark\:bg-gray-700 {
                background-color: #374151;
            }
        }
    </style>
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });
    </script>
</head>

    <script>
        // Beijing time-based greeting
        function updateTimeGreeting() {
            const now = new Date();
            // Convert to Beijing time (UTC+8)
            const beijingHour = (now.getUTCHours() + 8) % 24;
            let greeting = "";
            
            if (beijingHour >= 5 && beijingHour < 12) {
                greeting = "早上好，你今天早上有美好的梦想吗?";
            } else if (beijingHour >= 12 && beijingHour < 14) {
                greeting = "中午空气清新，叫你事事顺心!";
            } else if (beijingHour >= 14 && beijingHour < 18) {
                greeting = "下午茶时间到，要不要一起云干杯？";
            } else if (beijingHour >= 18 && beijingHour < 22) {
                greeting = "晚上好呀～忙了一天，快来这儿喘口气吧！";
            } else {
                greeting = "深夜了~偷偷告诉你，我们的服务器也会在深夜吃‘电子夜宵’🍕";
            }
            
            document.getElementById('timeGreeting').textContent = greeting;
        }
        
        updateTimeGreeting();
        setInterval(updateTimeGreeting, 60000); // Update every minute
        
        // Quota system
        function initQuotaSystem() {
            const quotaKey = 'jiorkQuotaSystem';
            
            // Get current Beijing time
            const now = new Date();
            const beijingOffset = 8 * 60 * 60 * 1000; // 8 hours in milliseconds
            const beijingTime = new Date(now.getTime() + beijingOffset);
            
            // Reset hour is every 3 hours: 0, 3, 6, 9, 12, 15, 18, 21
            const currentHour = beijingTime.getUTCHours();
            const resetHour = Math.floor(currentHour / 3) * 3;
            const nextResetHour = (resetHour + 3) % 24;
            
            // Create reset time (next 3-hour mark)
            const resetTime = new Date(beijingTime);
            if (resetHour === currentHour) {
                // If we're exactly at a reset hour, check if we need to reset
                const currentMinute = beijingTime.getUTCMinutes();
                const currentSecond = beijingTime.getUTCSeconds();
                if (currentMinute > 0 || currentSecond > 0) {
                    // Not exactly at the start of the hour, so reset at next 3-hour mark
                    resetTime.setUTCHours(nextResetHour, 0, 0, 0);
                } else {
                    // Exactly at the start of a reset hour, quota should have been reset already
                    resetTime.setUTCHours(nextResetHour, 0, 0, 0);
                }
            } else {
                // Not at a reset hour, reset at next 3-hour mark
                resetTime.setUTCHours(nextResetHour, 0, 0, 0);
            }
            
            let quota = {
                remaining: 50,
                resetTime: resetTime.getTime(),
                lastCheck: now.getTime()
            };
            
            // Try to get existing quota from localStorage
            try {
                const savedQuota = localStorage.getItem(quotaKey);
                if (savedQuota) {
                    const parsedQuota = JSON.parse(savedQuota);
                    
                    // Check if we need to reset the quota
                    if (now.getTime() >= parsedQuota.resetTime) {
                        // Reset quota
                        quota.remaining = 50;
                        quota.resetTime = resetTime.getTime();
                    } else {
                        // Use saved quota
                        quota = parsedQuota;
                    }
                }
            } catch (e) {
                console.error('Error loading quota:', e);
            }

        // Format timestamp to readable date
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.round(diffMs / 60000);
            const diffHours = Math.round(diffMs / 3600000);
            const diffDays = Math.round(diffMs / 86400000);
            
            if (diffMins < 1) return '刚刚';
            if (diffMins < 60) return `${diffMins}分钟前`;
            if (diffHours < 24) return `${diffHours}小时前`;
            if (diffDays < 7) return `${diffDays}天前`;
            
            return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
        }

        async function generateChatTitle(message) {

        // DeepSeek API integration
        async function callDeepSeekAPI(message, model, isWebSearch = false, isDeepThinking = false, previousMessages = []) {
            console.log("Calling DeepSeek API");
            const apiKey = "sk-e1ed90c2effc4415beeee85845f66d05";
            const apiUrl = "https://api.deepseek.com/v1/chat/completions";
            
            // Prepare messages array with context from previous messages
            let messages = [];
            
            // Add system message based on the model and options
            let systemMessage = "";
            if (isWebSearch) {
                systemMessage = "请通过联网搜索获取最新信息来回答问题。请包含你找到的信息来源。";
            } else if (isDeepThinking) {
                systemMessage = "请进行深度思考，分析问题的多个层面。请在回答前详细说明你的思考过程，分步骤列出你的推理过程。";
            } else if (model === "Jork-Trax-4") {
                systemMessage = "你是Jork-Trax-4，由Tenyun Tech （腾云科技）旗下 JorkAI开发的一个专业的编程助手，擅长提供高质量的代码和技术解决方案。";
            } else {
                systemMessage = "你是Jork-Epist-4，由Tenyun Tech （腾云科技）旗下 JorkAI开发的一个友好、专业的AI助手。你可以提供详细且有用的回答。";
            }
            
            messages.push({ role: "system", content: systemMessage });
            
            // Add previous messages for context (up to 10 most recent messages)
            if (previousMessages && previousMessages.length > 0) {
                const contextMessages = previousMessages.slice(-10);
                contextMessages.forEach(msg => {
                    messages.push({
                        role: msg.role,
                        content: msg.content
                    });
                });
            }
            
            // Add current user message
            messages.push({ role: "user", content: message });
            
            try {
                // For streaming
                if (document.getElementById('streamingResponse')) {
                    const response = await fetch(apiUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: model === "Jork-Trax-4" ? "deepseek-coder" : "deepseek-chat",
                            messages: messages,
                            temperature: 0.7,
                            stream: true,
                            max_tokens: isDeepThinking ? 4000 : 2000
                        })
                    });
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let buffer = "";
                    let fullResponse = "";
                    let thinking = isDeepThinking ? [] : null;
                    
                    const responseContent = document.getElementById('responseContent');
                    
                    // Process the stream
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        
                        // Process complete lines in the buffer
                        let lines = buffer.split("\n");
                        buffer = lines.pop() || ""; // Keep the last incomplete line in the buffer
                        
                        for (const line of lines) {
                            if (line.startsWith("data: ")) {
                                const data = line.substring(6);
                                if (data === "[DONE]") continue;
                                
                                try {
                                    const parsedData = JSON.parse(data);
                                    if (parsedData.choices && parsedData.choices[0].delta.content) {
                                        const content = parsedData.choices[0].delta.content;
                                        fullResponse += content;
                                        
                                        // If deep thinking, try to extract thinking steps
                                        if (isDeepThinking && fullResponse.includes("思考步骤") && !fullResponse.includes("最终回答")) {
                                            const thinkingMatch = fullResponse.match(/思考步骤 \d+[：:] (.*?)(?=思考步骤 \d+[：:]|$)/gs);
                                            if (thinkingMatch) {
                                                thinking = thinkingMatch.map(step => step.trim());
                                            }
                                        }
                                        
                                        // Update UI with the latest content
                                        responseContent.innerHTML = marked.parse(fullResponse);
                                        
                                        // Process code blocks to add syntax highlighting
                                        const codeBlocks = responseContent.querySelectorAll('pre');
                                        codeBlocks.forEach(block => {
                                            if (!block.classList.contains('code-block')) {
                                                block.className = 'code-block relative';
                                            }
                                        });
                                        
                                        // Scroll to bottom
                                        chatContainer.scrollTop = chatContainer.scrollHeight;
                                    }
                                } catch (e) {
                                    console.error("Error parsing stream data:", e);
                                }
                            }
                        }
                    }
                    
                    return { content: fullResponse, thinking: thinking };
                } else {
                    // Non-streaming response
                    const response = await fetch(apiUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: model === "Jork-Trax-4" ? "deepseek-coder" : "deepseek-chat",
                            messages: messages,
                            temperature: 0.7,
                            stream: false,
                            max_tokens: isDeepThinking ? 4000 : 2000
                        })
                    });
                    
                    const data = await response.json();
                    const content = data.choices[0].message.content;
                    
                    // Extract thinking steps if deep thinking was requested
                    let thinking = null;
                    if (isDeepThinking && content.includes("思考步骤")) {
                        const thinkingMatch = content.match(/思考步骤 \d+[：:] (.*?)(?=思考步骤 \d+[：:]|$)/gs);
                        if (thinkingMatch) {
                            thinking = thinkingMatch.map(step => step.trim());
                        }
                    }
                    
                    return { content, thinking };
                }
            } catch (error) {
                console.error("DeepSeek API Error:", error);
                return {
                    content: `调用API时发生错误: ${error.message || '未知错误'}`,
                    thinking: null
                };
            }
        }
        
        // Register handler for streaming responses with Poe API
        if (window.Poe) {
            window.Poe.registerHandler("streaming-handler", (result, context) => {
                const streamingElement = document.getElementById('streamingResponse');
                if (!streamingElement) return;
                
                // Get the first response (there should only be one)
                if (result.responses.length === 0) return;
                
                const msg = result.responses[0];
                const responseContent = document.getElementById('responseContent');
                
                if (msg.status === "error") {
                    responseContent.textContent = "Error: " + (msg.statusText || "Unknown error");
                    responseContent.classList.add("error");
                } else if (msg.status === "incomplete") {
                    // Update with partial content while streaming
                    responseContent.innerHTML = marked.parse(msg.content);
                    
                    // Process code blocks to add syntax highlighting
                    const codeBlocks = responseContent.querySelectorAll('pre');
                    codeBlocks.forEach(block => {
                        block.className = 'code-block relative';
                    });
                } else if (msg.status === "complete") {
                    // Finalize response
                    finalizeStreamingResponse(msg.content);
                }
                
                // Scroll to bottom
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }
        
        function appendAssistantMessage(message, thinking = null) {
            const chatView = document.getElementById('chatView');
            
            const messageContainer = document.createElement('div');
            messageContainer.className = 'mb-8';
            
            // Display thinking process if provided
            if (thinking) {
                const thinkingContainer = document.createElement('div');
                thinkingContainer.className = 'thinking-container mb-4';
                
                const thinkingHeader = document.createElement('div');
                thinkingHeader.className = 'font-medium text-purple-600 dark:text-purple-400 mb-2';
                thinkingHeader.textContent = '深度思考过程：';
                
                thinkingContainer.appendChild(thinkingHeader);
                
                thinking.forEach((step, index) => {
                    const thinkingStep = document.createElement('div');
                    thinkingStep.className = 'thinking-step text-sm text-gray-600 dark:text-gray-400';
                    thinkingStep.style.animationDelay = `${index * 0.3}s`;
                    thinkingStep.textContent = step;
                    thinkingContainer.appendChild(thinkingStep);
                });
                
                messageContainer.appendChild(thinkingContainer);
            }
            
            // Process the message for markdown
            const markdownOutput = marked.parse(message);
            
            const messageContent = document.createElement('div');
            messageContent.className = 'markdown-content';
            messageContent.innerHTML = markdownOutput;
            
            // Process code blocks to add copy buttons
            const codeBlocks = messageContent.querySelectorAll('pre');
            codeBlocks.forEach(block => {
                block.className = 'code-block relative';
                
                const copyButton = document.createElement('button');
                copyButton.className = 'copy-button text-xs';
                copyButton.innerHTML = '<i class="fas fa-copy"></i>';
                copyButton.title = '复制代码';
                
                copyButton.addEventListener('click', () => {
                    const code = block.querySelector('code')?.textContent || '';
                    navigator.clipboard.writeText(code).then(() => {
                        copyButton.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(() => {
                            copyButton.innerHTML = '<i class="fas fa-copy"></i>';
                        }, 2000);
                    });
                });
                
                block.appendChild(copyButton);
            });
            
            messageContainer.appendChild(messageContent);
            
            // Add the logo and response controls
            const logoAndControls = document.createElement('div');
            logoAndControls.className = 'flex justify-between items-center mb-8';
            
            const logoContainer = document.createElement('div');
            logoContainer.className = 'flex items-center text-orange-400 mb-2';
            
            const disclaimer = document.createElement('div');
            disclaimer.className = 'text-sm text-gray-500';
            disclaimer.textContent = 'Jork可能会犯错，请核实回复内容。';
            
            const controlsContainer = document.createElement('div');
            controlsContainer.className = 'flex items-center space-x-2';
            
            const copyButton = document.createElement('button');
            copyButton.className = 'p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300';
            copyButton.innerHTML = '<i class="far fa-clipboard"></i>';
            
            const thumbsUpButton = document.createElement('button');
            thumbsUpButton.className = 'p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300';
            thumbsUpButton.innerHTML = '<i class="far fa-thumbs-up"></i>';
            
            const thumbsDownButton = document.createElement('button');
            thumbsDownButton.className = 'p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300';
            thumbsDownButton.innerHTML = '<i class="far fa-thumbs-down"></i>';
            
            const regenerateButton = document.createElement('button');
            regenerateButton.className = 'p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300';
            regenerateButton.innerHTML = '<i class="fas fa-redo"></i>';
            
            controlsContainer.appendChild(copyButton);
            controlsContainer.appendChild(thumbsUpButton);
            controlsContainer.appendChild(thumbsDownButton);
            controlsContainer.appendChild(regenerateButton);
            
            logoAndControls.appendChild(disclaimer);
            logoAndControls.appendChild(controlsContainer);
            
            chatView.appendChild(messageContainer);
            chatView.appendChild(logoAndControls);
            
            // Add to current messages
            currentMessages.push({
                role: 'assistant',
                content: message,
                thinking: thinking
            });
            
            // Save chat
            saveChat(currentMessages);
            
            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // Set up copy button functionality
            copyButton.addEventListener('click', () => {
                navigator.clipboard.writeText(message).then(() => {
                    copyButton.innerHTML = '<i class="fas fa-check"></i>';
                    setTimeout(() => {
                        copyButton.innerHTML = '<i class="far fa-clipboard"></i>';
                    }, 2000);
                });
            });
            
            // Set up regenerate button functionality
            regenerateButton.addEventListener('click', () => {
                // Remove the last assistant message from the UI
                const messages = chatView.querySelectorAll('.mb-8');
                if (messages.length >= 2) {
                    messages[messages.length - 1].remove(); // Remove controls
                    messages[messages.length - 2].remove(); // Remove message
                }
                
                // Remove the last assistant message from the current messages array
                currentMessages.pop();
                
                // Save updated chat history
                saveChat(currentMessages);
                
                // Get the last user message
                const lastUserMessage = currentMessages.filter(msg => msg.role === 'user').pop();
                
                if (lastUserMessage) {
                    // Get the current model
                    const model = getSelectedModel('replyModelSelector');
                    
                    // Regenerate response
                    appendStreamingResponse();
                    callDeepSeekAPI(lastUserMessage.content, model, false, false, currentMessages.slice(0, -1))
                        .then(response => {
                            finalizeStreamingResponse(response.content, response.thinking);
                        })
                        .catch(error => {
                            console.error('Error regenerating response:', error);
                            finalizeStreamingResponse('抱歉，重新生成回答时发生错误，请重试。');
                        });
                }
            });
        }
        
        // Streaming response handling with typing effect
        function appendStreamingResponse() {
            const chatView = document.getElementById('chatView');
            
            const messageContainer = document.createElement('div');
            messageContainer.className = 'mb-8';
            messageContainer.id = 'streamingResponse';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'markdown-content';
            messageContent.id = 'responseContent';
            
            // Add typing animation
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'ai-typing';
            messageContent.appendChild(typingIndicator);
            
            messageContainer.appendChild(messageContent);
            chatView.appendChild(messageContainer);
            
            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageContent;
        }
        
        function finalizeStreamingResponse(message, thinking = null) {
            const streamingContainer = document.getElementById('streamingResponse');
            if (!streamingContainer) return;
            
            // Remove the streaming container
            streamingContainer.remove();
            
            // Append the full message
            appendAssistantMessage(message, thinking);
        }
        
        // Get selected model value
        function getSelectedModel(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            const selectedOption = dropdown.querySelector('.dropdown-option.selected');
            return selectedOption.dataset.value;
        }
        
        // Map Jork models to DeepSeek models
        function mapModelToDeepSeekModel(jorkModel) {
            if (jorkModel === "Jork-Trax-4") {
                return "deepseek-coder";
            } else {
                return "deepseek-chat";
            }
        }
        
        // Send message handlers
        async function sendMessage(input, isWebSearch = false, isDeepThinking = false) {
            if (input.value.trim() === '') return;
            
            // Check if we have enough quota
            if (!quotaSystem.useQuestion()) {
                alert('您的免费提问次数已用完，请等待下一个重置周期或升级账户。');
                return;
            }
            
            const message = input.value.trim();
            const jorkModel = (input.id === 'userInput') ? 
                getSelectedModel('modelSelector') : 
                getSelectedModel('replyModelSelector');
            
            // Hide initial view and show chat view
            document.getElementById('initialView').classList.add('hidden');
            document.getElementById('chatView').classList.remove('hidden');
            document.getElementById('bottomInputArea').classList.remove('hidden');
            
            // Get file attachments
            const filesSource = input.id === 'userInput' ? uploadedFiles.main : uploadedFiles.reply;
            const fileAttachments = [...filesSource];
            
            // Append user message with attachments
            appendUserMessage(message, false, fileAttachments);
            
            // Clear input and attachments
            input.value = '';
            filesSource.length = 0;
            document.getElementById(input.id === 'userInput' ? 'filePreviewArea' : 'replyFilePreviewArea').classList.add('hidden');
            document.getElementById(input.id === 'userInput' ? 'filePreviewArea' : 'replyFilePreviewArea').innerHTML = '';
            
            // Create streaming response container
            appendStreamingResponse();
            
            try {
                // Call DeepSeek API with previous messages for context
                const response = await callDeepSeekAPI(message, jorkModel, isWebSearch, isDeepThinking, currentMessages);
                
                // Update the UI with the response
                finalizeStreamingResponse(response.content, response.thinking);
            } catch (error) {
                console.error('Error calling API:', error);
                // Update with error message
                finalizeStreamingResponse(`抱歉，发生了错误：${error.message || '无法连接到服务'}`);
            }
        }
        
        // Send button handlers
        document.getElementById('sendButton').addEventListener('click', function() {
            sendMessage(document.getElementById('userInput'));
        });
        
        document.getElementById('replySendButton').addEventListener('click', function() {
            sendMessage(document.getElementById('replyInput'));
        });
        
        // Web search button
        document.getElementById('webSearchButton').addEventListener('click', function() {
            sendMessage(document.getElementById('replyInput'), true, false);
        });
        
        // Deep thinking button
        document.getElementById('deepThinkingButton').addEventListener('click', function() {
            sendMessage(document.getElementById('replyInput'), false, true);
        });
        
        // Enter key handlers
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && this.value.trim() !== '') {
                e.preventDefault();
                sendMessage(this);
            }
        });
        
        document.getElementById('replyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && this.value.trim() !== '') {
                e.preventDefault();
                sendMessage(this);
            }
        });
        
        // Category button click handlers
        document.querySelectorAll('.rounded-full').forEach(button => {
            button.addEventListener('click', function() {
                const category = this.textContent.trim();
                let prompt = "";
                
                if (category.includes('写作')) {
                    prompt = "我需要一些写作方面的帮助，可以给我一些写作技巧吗？";
                } else if (category.includes('学习')) {
                    prompt = "我想学习一个新技能，有什么高效的学习方法？";
                } else if (category.includes('编程')) {
                    prompt = "我是编程初学者，应该从哪种编程语言开始学习？";
                } else if (category.includes('生活问题')) {
                    prompt = "有什么提高日常生活效率的小技巧？";
                } else if (category.includes('Jork的选择')) {
                    const choices = [
                        "人工智能的发展历史是怎样的？",
                        "如何在工作中更有效地沟通？",
                        "有哪些值得推荐的科普书籍？",
                        "如何开始一个健康的生活方式？"
                    ];
                    prompt = choices[Math.floor(Math.random() * choices.length)];
                }
                
                document.getElementById('userInput').value = prompt;
                document.getElementById('sendButton').click();
            });
        });
        
        // Get references for easier access
        const chatContainer = document.getElementById('chatContainer');
    </script>
</body>
</html>
