<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JorkAI聊天界面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        .sidebar {
            transition: all 0.3s ease;
            opacity: 1;
        }
        .sidebar.hidden {
            transform: translateX(-100%);
            opacity: 0;
        }
        
        .thinking-container {
            border-left: 3px solid #5D5CDE;
            padding-left: 1rem;
            margin: 1rem 0;
            position: relative;
        }
        
        .thinking-step {
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s forwards;
        }
        
        .typing-animation::after {
            content: "";
            display: inline-block;
            width: 0.5em;
            animation: typing 1.5s infinite;
        }
        
        /* Custom dropdown styling */
        .custom-dropdown {
            position: relative;
            user-select: none;
        }
        
        .dropdown-selected {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        .dark .dropdown-selected {
            background-color: rgba(31, 41, 55, 0.8);
            border-color: #374151;
            color: #e2e8f0;
        }
        
        .dropdown-selected:hover {
            border-color: #5D5CDE;
        }
        
        .dropdown-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 0.25rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 10;
            opacity: 0;
            transform: translateY(-10px);
            visibility: hidden;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        
        .dark .dropdown-options {
            background-color: #1F2937;
            border-color: #374151;
        }
        
        .dropdown-options.open {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
        
        .dropdown-option {
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .dropdown-option:hover {
            background-color: #EEF2FF;
        }
        
        .dark .dropdown-option:hover {
            background-color: #374151;
        }
        
        .dropdown-option.selected {
            background-color: #EEF2FF;
            color: #5D5CDE;
        }
        
        .dark .dropdown-option.selected {
            background-color: #2D3748;
            color: #81E6D9;
        }
        
        @keyframes typing {
            0%, 100% { content: ""; }
            25% { content: "."; }
            50% { content: ".."; }
            75% { content: "..."; }
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .code-block {
            background-color: #f0f0f0;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            position: relative;
            overflow-x: auto;
        }
        
        .dark .code-block {
            background-color: #1E293B;
        }
        
        .copy-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.25rem;
            cursor: pointer;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        
        table, th, td {
            border: 1px solid #e2e8f0;
        }
        
        .dark table, .dark th, .dark td {
            border-color: #374151;
        }
        
        th, td {
            padding: 0.5rem;
            text-align: left;
        }
        
        th {
            background-color: #f8fafc;
        }
        
        .dark th {
            background-color: #1E293B;
        }
        
        .file-preview {
            display: flex;
            align-items: center;
            background-color: #f3f4f6;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin: 0.5rem 0;
            max-width: 100%;
        }
        
        .dark .file-preview {
            background-color: #374151;
        }
        
        .file-icon {
            font-size: 1.5rem;
            margin-right: 0.75rem;
            color: #5D5CDE;
        }
        
        .file-info {
            flex-grow: 1;
            overflow: hidden;
        }
        
        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        
        .file-size {
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .dark .file-size {
            color: #9ca3af;
        }
        
        .file-remove {
            color: #ef4444;
            cursor: pointer;
            padding: 0.25rem;
        }
        
        /* Chat history item styling */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .chat-item:hover {
            background-color: #f3f4f6;
            border-left-color: #5D5CDE;
        }
        
        .dark .chat-item:hover {
            background-color: #374151;
        }
        
        .chat-item-icon {
            margin-right: 0.75rem;
            color: #5D5CDE;
        }
        
        .chat-item-content {
            flex-grow: 1;
            overflow: hidden;
        }
        
        .chat-item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-item-time {
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .dark .chat-item-time {
            color: #9ca3af;
        }

        .chat-item-actions {
            display: flex;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chat-item:hover .chat-item-actions {
            opacity: 1;
        }
        
        /* Canvas and code interaction styles */
        .canvas-buttons {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .code-block:hover .canvas-buttons {
            opacity: 1;
        }

        .chat-item-delete {
            color: #ef4444;
            cursor: pointer;
            padding: 0.25rem;
            margin-left: 0.5rem;
        }
        
        .user-message-container {
            background-color: #f3f4f6;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .dark .user-message-container {
            background-color: #2d3748;
        }
        
        /* Markdown typography improvements */
        .markdown-content h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .dark .markdown-content h1 {
            border-color: #4b5563;
        }
        
        .markdown-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.4rem;
            margin-bottom: 0.7rem;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .dark .markdown-content h2 {
            border-color: #4b5563;
        }
        
        .markdown-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 1.3rem;
            margin-bottom: 0.65rem;
        }
        
        .markdown-content h4 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 1.2rem;
            margin-bottom: 0.6rem;
        }
        
        .markdown-content h5 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 1.1rem;
            margin-bottom: 0.55rem;
        }
        
        .markdown-content h6 {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .markdown-content p {
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        
        .markdown-content li {
            margin-bottom: 0.5rem;
        }
        
        .markdown-content blockquote {
            border-left: 4px solid #e2e8f0;
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1rem;
            color: #4b5563;
        }
        
        .dark .markdown-content blockquote {
            border-color: #4b5563;
            color: #9ca3af;
        }
        
        /* Typing animation */
        .ai-typing {
            display: inline-block;
            position: relative;
            min-height: 20px;
            width: 60px;
        }
        
        .ai-typing::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 16px;
            background-color: #5D5CDE;
            animation: typing-cursor 0.8s infinite;
            margin-left: 4px;
        }
        
        @keyframes typing-cursor {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        /* Quota warning */
        .quota-warning {
            background-color: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .dark .quota-warning {
            background-color: #78350f;
            border-color: #f59e0b;
            color: #fef3c7;
        }
        
        .quota-warning-icon {
            color: #f59e0b;
            margin-right: 0.5rem;
            font-size: 1.25rem;
        }
        
        .current-chat-title {
            margin-left: 1rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        
        /* Redemption code modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        
        .modal {
            background-color: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .dark .modal {
            background-color: #1F2937;
            color: white;
        }
        
        /* Stop generation button */
        .stop-generation {
            background-color: #fee2e2;
            color: #ef4444;
        }
        
        .dark .stop-generation {
            background-color: #7f1d1d;
            color: #fca5a5;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .dark\:bg-gray-900 {
                background-color: #181818;
            }
            .dark\:text-white {
                color: #FFFFFF;
            }
            .dark\:border-gray-700 {
                border-color: #374151;
            }
            .dark\:bg-gray-800 {
                background-color: #1F2937;
            }
            .dark\:hover\:bg-gray-700:hover {
                background-color: #374151;
            }
            .dark\:bg-gray-700 {
                background-color: #374151;
            }
        }
    </style>
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });
    </script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-white min-h-screen flex flex-col" style="background-color: #F9F9F9;">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar hidden fixed left-0 top-0 h-full w-72 bg-gray-100 dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 z-10">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <h2 class="text-lg font-semibold">聊天历史</h2>
            <button id="closeBtn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="p-4">
            <button id="newChatBtn" class="w-full py-2 px-4 bg-orange-200 text-orange-600 rounded-lg hover:bg-orange-300 transition-colors flex items-center justify-center mb-4">
                <i class="fas fa-plus mr-2"></i> 新建聊天
            </button>
        </div>
        <div id="chatHistory" class="p-4 overflow-y-auto" style="max-height: calc(100vh - 130px);">
            <div class="space-y-2">
                <!-- Empty state message -->
                <p id="emptyHistoryMessage" class="text-gray-500 dark:text-gray-400 text-sm">暂无聊天历史</p>
                <!-- Chat history items will be dynamically added here -->
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="flex flex-col h-screen">
        <!-- Top bar -->
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center">
                <button id="sidebarToggle" class="text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 p-2 rounded-md">
                    <i class="fas fa-bars"></i>
                </button>
                <div id="currentChatTitle" class="current-chat-title hidden"></div>
            </div>
            <div id="quotaContainer" class="flex items-center">
                <span id="pointsDisplay" class="mr-2 text-sm font-medium">积分: 3000</span>
                <button id="addPointsBtn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 p-1 rounded-md">
                    <i class="fas fa-plus-circle"></i>
                </button>
            </div>
        </div>

        <!-- Chat area -->
        <div id="chatContainer" class="flex-grow overflow-auto p-4">
            <div class="max-w-4xl mx-auto">
                <!-- Initial view -->
                <div id="initialView" class="flex flex-col items-center justify-center mt-8">
                    <div class="bg-gray-100 dark:bg-gray-800 rounded-full px-4 py-1 flex items-center space-x-2 mb-4">
                        <span class="text-gray-600 dark:text-gray-300">免费计划</span>
                        <span>•</span>
                        <a href="#" class="text-blue-500 hover:text-blue-600">升级</a>
                    </div>
                    <div class="text-3xl font-semibold mb-8 flex items-center">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ9NAHBHbG_tj_AFFrJGCKAWEPDRtvFL28sug&s" alt="Logo" class="w-8 h-8 mr-2 rounded-full object-cover"> <span id="timeGreeting">准备就绪</span>
                    </div>
                    <div class="w-full max-w-2xl">
                        <div id="quotaWarning" class="quota-warning hidden mb-4">
                            <div class="flex items-center">
                                <i class="fas fa-exclamation-triangle quota-warning-icon"></i>
                                <span>您的积分即将用尽，还剩下 <strong id="lowPointsValue">50</strong> 积分。</span>
                            </div>
                            <a href="#" class="text-blue-600 dark:text-blue-400 font-medium">升级</a>
                        </div>
                        
                        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-4">
                            <input id="userInput" type="text" placeholder="有什么可以帮助你的？" class="w-full p-2 focus:outline-none bg-transparent text-base">
                            <div id="filePreviewArea" class="mt-2 hidden"></div>
                            <div class="flex justify-between items-center mt-2">
                                <div class="flex items-center">
                                    <button id="uploadButton" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 rounded-md">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                    <button class="p-2 text-gray-400 ml-1">
                                        <i class="fas fa-feather"></i>
                                    </button>
                                </div>
                                <div class="flex items-center">
                                    <div id="modelSelector" class="custom-dropdown mr-2">
                                        <div class="dropdown-selected">
                                            <span>Jork-Epist-4</span>
                                            <i class="fas fa-chevron-down ml-2 text-xs"></i>
                                        </div>
                                        <div class="dropdown-options">
                                            <div class="dropdown-option selected" data-value="Jork-Epist-4">Jork-Epist-4</div>
                                            <div class="dropdown-option" data-value="Jork-Trax-4">Jork-Trax-4</div>
                                        </div>
                                    </div>
                                    <button id="sendButton" class="bg-orange-200 text-orange-600 p-2 rounded-md">
                                        <i class="fas fa-arrow-up"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-wrap justify-center space-x-2 mt-6">
                            <button class="flex items-center px-4 py-2 mb-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700">
                                <i class="fas fa-pen mr-2"></i> 写作
                            </button>
                            <button class="flex items-center px-4 py-2 mb-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700">
                                <i class="fas fa-graduation-cap mr-2"></i> 学习
                            </button>
                            <button class="flex items-center px-4 py-2 mb-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700">
                                <i class="fas fa-code mr-2"></i> 编程
                            </button>
                            <button class="flex items-center px-4 py-2 mb-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700">
                                <i class="fas fa-coffee mr-2"></i> 生活问题
                            </button>
                            <button class="flex items-center px-4 py-2 mb-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700">
                                <i class="fas fa-lightbulb mr-2"></i> Jork的选择
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Chat view (initially hidden) -->
                <div id="chatView" class="hidden">
                    <!-- Messages will be dynamically added here -->
                </div>
            </div>
        </div>
        
        <!-- Bottom input area (only visible in chat view) -->
        <div id="bottomInputArea" class="hidden border-t border-gray-200 dark:border-gray-700 p-4">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
                    <input id="replyInput" type="text" placeholder="回复 Jork..." class="w-full p-2 focus:outline-none bg-transparent text-base">
                    <div id="replyFilePreviewArea" class="mt-2 hidden"></div>
                    <div class="flex justify-between items-center mt-2">
                        <div class="flex items-center">
                            <button id="replyUploadButton" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 rounded-md">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button id="webSearchButton" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 rounded-md ml-1" title="联网搜索">
                                <i class="fas fa-search"></i>
                            </button>
                            <button id="deepThinkingButton" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 rounded-md ml-1" title="深度思考">
                                <i class="fas fa-brain"></i>
                            </button>
                        </div>
                        <div class="flex items-center">
                            <div id="replyModelSelector" class="custom-dropdown mr-2">
                                <div class="dropdown-selected">
                                    <span>Jork-Epist-4</span>
                                    <i class="fas fa-chevron-down ml-2 text-xs"></i>
                                </div>
                                <div class="dropdown-options">
                                    <div class="dropdown-option selected" data-value="Jork-Epist-4">Jork-Epist-4</div>
                                    <div class="dropdown-option" data-value="Jork-Trax-4">Jork-Trax-4</div>
                                </div>
                            </div>
                            <button id="replySendButton" class="bg-orange-200 text-orange-600 p-2 rounded-md">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- File upload input (hidden) -->
    <input type="file" id="fileInput" class="hidden">
    <input type="file" id="replyFileInput" class="hidden">
    
    <!-- Redemption code modal (hidden by default) -->
    <div id="redemptionModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-medium">兑换积分</h3>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="mb-4">请输入兑换码以获取额外积分</p>
            <input id="redemptionCodeInput" type="text" placeholder="输入兑换码" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md mb-4 bg-white dark:bg-gray-800 text-base">
            <div class="flex justify-end">
                <button id="cancelRedemptionBtn" class="px-4 py-2 mr-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md transition-colors">
                    取消
                </button>
                <button id="redeemCodeBtn" class="px-4 py-2 bg-orange-200 text-orange-600 rounded-md hover:bg-orange-300 transition-colors">
                    兑换
                </button>
            </div>
            <div id="redemptionResult" class="mt-3 text-center hidden"></div>
        </div>
    </div>
    
    <!-- Ask JorkAI button (hidden, positioned via JS) -->
    <div id="askJorkButton" class="fixed bg-orange-200 text-orange-600 px-3 py-1.5 rounded-full shadow-lg z-50 flex items-center cursor-pointer hover:bg-orange-300 transition-colors hidden">
        <i class="fas fa-question-circle mr-2"></i>提问JorkAI
    </div>

    <script>
        // Canvas interaction functionality
        function setupCanvasInteraction() {
            // Create canvas button container for code blocks
            document.addEventListener('click', function(e) {

            const beijingTime = new Date(now.getTime() + beijingOffset);
            
            // Create reset time (next day at 00:00 Beijing time)
            const resetTime = new Date(beijingTime);
            resetTime.setUTCHours(16, 0, 0, 0); // 00:00 next day in Beijing is 16:00 UTC
            
            // If current time is past today's reset time, set reset to tomorrow
            if (beijingTime.getUTCHours() >= 16) {
                resetTime.setUTCDate(resetTime.getUTCDate() + 1);
            }
            
            let points = {
                remaining: 3000,
                resetTime: resetTime.getTime(),
                lastCheck: now.getTime()
            };
            
            // Initialize redeemed codes array
            let redeemedCodes = [];
            try {
                const savedRedeemedCodes = localStorage.getItem(redeemedCodesKey);
                if (savedRedeemedCodes) {
                    redeemedCodes = JSON.parse(savedRedeemedCodes);
                } else {
                    localStorage.setItem(redeemedCodesKey, JSON.stringify(redeemedCodes));
                }
            } catch (e) {
                console.error('Error loading redeemed codes:', e);
                localStorage.setItem(redeemedCodesKey, JSON.stringify([]));

            // Try to get existing points from localStorage
            try {
                const savedPoints = localStorage.getItem(pointsKey);
                if (savedPoints) {
                    const parsedPoints = JSON.parse(savedPoints);
                    
                    // Check if we need to reset the points
                    if (now.getTime() >= parsedPoints.resetTime) {
                        // Reset points
                        points.remaining = 3000;
                        points.resetTime = resetTime.getTime();
                    } else {
                        // Use saved points
                        points = parsedPoints;
                    }
                }
            } catch (e) {
                console.error('Error loading points:', e);

            selected.addEventListener('click', () => {

            optionElements.forEach(option => {
                option.addEventListener('click', () => {

                    selected.querySelector('span').textContent = option.textContent;
                    
                    // Update selected state
                    optionElements.forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    option.classList.add('selected');
                    
                    // Close dropdown
                    options.classList.remove('open');
                });
            });

        // Format timestamp to readable date
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.round(diffMs / 60000);
            const diffHours = Math.round(diffMs / 3600000);
            const diffDays = Math.round(diffMs / 86400000);
            
            if (diffMins < 1) return '刚刚';
            if (diffMins < 60) return `${diffMins}分钟前`;
            if (diffHours < 24) return `${diffHours}小时前`;
            if (diffDays < 7) return `${diffDays}天前`;
            
            return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
        }
        
        function updateChatHistorySidebar() {
            const historyContainer = document.getElementById('chatHistory');
            const emptyMessage = document.getElementById('emptyHistoryMessage');
            
            if (chatHistory.length === 0) {
                emptyMessage.classList.remove('hidden');
                return;
            }
            
            emptyMessage.classList.add('hidden');
            
            // Remove existing history items
            const existingItems = historyContainer.querySelectorAll('.chat-item');
            existingItems.forEach(item => item.remove());
            
            // Add history entries in reverse chronological order
            chatHistory.slice().reverse().forEach((chat, index) => {
                const originalIndex = chatHistory.length - 1 - index;
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                
                const chatHtml = `
                    <div class="chat-item-icon">
                        <i class="fas fa-comment-dots"></i>
                    </div>
                    <div class="chat-item-content">
                        <div class="chat-item-title">${chat.title || `对话 ${originalIndex + 1}`}</div>
                        <div class="chat-item-time">${formatTimestamp(chat.timestamp)}</div>
                    </div>
                    <div class="chat-item-actions">
                        <div class="chat-item-delete" data-index="${originalIndex}" title="删除对话">
                            <i class="fas fa-trash-alt"></i>
                        </div>
                    </div>
                `;
                
                chatItem.innerHTML = chatHtml;
                chatItem.dataset.index = originalIndex;
                
                chatItem.addEventListener('click', (e) => {
                    // Don't trigger chat load if delete button was clicked
                    if (e.target.closest('.chat-item-delete')) {
                        return;
                    }
                    
                    loadChat(originalIndex);
                    document.getElementById('sidebar').classList.add('hidden');
                });
                
                // Add delete button handler
                const deleteBtn = chatItem.querySelector('.chat-item-delete');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteChat(originalIndex);
                });
                
                historyContainer.appendChild(chatItem);
            });
        }
        
        function deleteChat(index) {
            if (confirm('确定要删除这个对话吗？')) {
                // Remove chat from array
                chatHistory.splice(index, 1);
                
                // Save to localStorage
                try {
                    localStorage.setItem('jiorkChatApp2023', JSON.stringify(chatHistory));
                    updateChatHistorySidebar();
                    
                    // If current chat was deleted, go back to initial view
                    if (document.getElementById('chatView').classList.contains('hidden') === false) {

        // Generate chat title using DeepSeek API
        async function generateChatTitle(message) {
            try {
                const apiKey = "sk-e1ed90c2effc4415beeee85845f66d05";
                const apiUrl = "https://api.deepseek.com/v1/chat/completions";
                
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { 
                                role: "system", 
                                content: "你是一个帮助生成聊天标题的助手。请为以下聊天内容生成一个简短的标题（不超过15个字），只返回标题文本，不要加引号或其他解释。" 
                            },
                            { role: "user", content: message }
                        ],
                        temperature: 0.5,
                        max_tokens: 25
                    })
                });
                
                const data = await response.json();
                const title = data.choices[0].message.content.trim();
                
                // Limit title length if it's too long
                return title.length > 20 ? title.substring(0, 20) + '...' : title;
            } catch (e) {
                console.error('Error generating title:', e);
                // Fallback to using the first part of the message
                return message.length > 15 ? message.substring(0, 15) + '...' : message;
            }
        }
        
        async function saveChat(messages) {
            // Create a new chat entry if needed
            if (chatHistory.length === 0 || chatHistory[chatHistory.length - 1].completed) {
                const userMsg = messages[0].content;
                
                // Generate title using DeepSeek API
                const title = await generateChatTitle(userMsg);
                
                // Create a unique ID for this chat
                const chatId = Date.now().toString();
                
                chatHistory.push({
                    id: chatId,
                    title: title,
                    timestamp: new Date().toISOString(),
                    messages: messages,
                    completed: false
                });
                
                // Update chat title in UI
                document.getElementById('currentChatTitle').textContent = title;
                document.getElementById('currentChatTitle').classList.remove('hidden');
            } else {
                // Update the last chat
                chatHistory[chatHistory.length - 1].messages = messages;
                chatHistory[chatHistory.length - 1].timestamp = new Date().toISOString();
            }
            
            // Save to localStorage
            try {
                localStorage.setItem('jiorkChatApp2023', JSON.stringify(chatHistory));
                updateChatHistorySidebar();
            } catch (e) {
                console.error('Error saving chat history:', e);
            }
        }

        function handleFileUpload(e, target) {
            const file = e.target.files[0];
            if (!file) return;
            
            // Add file to uploaded files array
            uploadedFiles[target].push(file);
            
            // Show preview area
            const previewArea = document.getElementById(target === 'main' ? 'filePreviewArea' : 'replyFilePreviewArea');
            previewArea.classList.remove('hidden');
            
            // Create file preview
            const filePreview = document.createElement('div');
            filePreview.className = 'file-preview';
            
            // Format file size
            const fileSize = formatFileSize(file.size);
            
            // Get file icon based on type
            const fileIcon = getFileIcon(file.type);
            
            filePreview.innerHTML = `
                <div class="file-icon">
                    <i class="${fileIcon}"></i>
                </div>
                <div class="file-info">
                    <div class="file-name">${file.name}</div>
                    <div class="file-size">${fileSize}</div>
                </div>
                <div class="file-remove" data-target="${target}" data-index="${uploadedFiles[target].length - 1}">
                    <i class="fas fa-times"></i>
                </div>
            `;
            
            previewArea.appendChild(filePreview);
            
            // Add event listener to remove button
            const removeButton = filePreview.querySelector('.file-remove');
            removeButton.addEventListener('click', function() {
                const target = this.dataset.target;
                const index = parseInt(this.dataset.index);
                
                // Remove file from array
                uploadedFiles[target].splice(index, 1);
                
                // Remove preview element
                this.closest('.file-preview').remove();
                
                // Hide preview area if empty
                if (uploadedFiles[target].length === 0) {
                    document.getElementById(target === 'main' ? 'filePreviewArea' : 'replyFilePreviewArea').classList.add('hidden');
                }
                
                // Update indices for remaining remove buttons
                const remainingButtons = document.querySelectorAll(`.file-remove[data-target="${target}"]`);
                remainingButtons.forEach((btn, i) => {
                    btn.dataset.index = i;
                });
            });
            
            // Reset file input to allow selecting the same file again
            e.target.value = '';
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            else return (bytes / 1048576).toFixed(1) + ' MB';
        }
        
        function getFileIcon(fileType) {
            if (fileType.startsWith('image/')) return 'far fa-file-image';
            else if (fileType.startsWith('video/')) return 'far fa-file-video';
            else if (fileType.startsWith('audio/')) return 'far fa-file-audio';
            else if (fileType.startsWith('text/')) return 'far fa-file-alt';
            else if (fileType.includes('pdf')) return 'far fa-file-pdf';
            else if (fileType.includes('word') || fileType.includes('document')) return 'far fa-file-word';
            else if (fileType.includes('excel') || fileType.includes('sheet')) return 'far fa-file-excel';
            else if (fileType.includes('powerpoint') || fileType.includes('presentation')) return 'far fa-file-powerpoint';
            else if (fileType.includes('zip') || fileType.includes('compressed')) return 'far fa-file-archive';
            else return 'far fa-file';
        }

        // DeepSeek API integration
        async function callDeepSeekAPI(message, model, isWebSearch = false, isDeepThinking = false, previousMessages = []) {
            console.log("Calling DeepSeek API");
            const apiKey = "sk-e1ed90c2effc4415beeee85845f66d05";
            const apiUrl = "https://api.deepseek.com/v1/chat/completions";
            
            // Create a new AbortController
            abortController = new AbortController();
            const signal = abortController.signal;
            
            // Prepare messages array with context from previous messages
            let messages = [];
            
            // Add system message based on the model and options
            let systemMessage = "";
            if (isWebSearch) {
                systemMessage = "请通过联网搜索获取最新信息来回答问题。请包含你找到的信息来源。";
            } else if (isDeepThinking) {
                systemMessage = "请进行深度思考，分析问题的多个层面。请在回答前详细说明你的思考过程，分步骤列出你的推理过程。";
            } else if (model === "Jork-Trax-4") {
                systemMessage = "你是Jork-Trax-4，由Tenyun Tech （腾云科技）旗下 JorkAI开发的一个专业的编程助手，擅长提供高质量的代码和技术解决方案。";
            } else {
                systemMessage = "你是Jork-Epist-4，由Tenyun Tech （腾云科技）旗下 JorkAI开发的一个友好、专业的AI助手。你可以提供详细且有用的回答。";
            }
            
            messages.push({ role: "system", content: systemMessage });
            
            // Add previous messages for context (up to 10 most recent messages)
            if (previousMessages && previousMessages.length > 0) {
                const contextMessages = previousMessages.slice(-10);
                contextMessages.forEach(msg => {
                    messages.push({
                        role: msg.role,
                        content: msg.content
                    });
                });
            }
            
            // Add current user message
            messages.push({ role: "user", content: message });
            
            try {
                // For streaming
                if (document.getElementById('streamingResponse')) {
                    const response = await fetch(apiUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: model === "Jork-Trax-4" ? "deepseek-coder" : "deepseek-chat",
                            messages: messages,
                            temperature: 0.7,
                            stream: true,
                            max_tokens: isDeepThinking ? 4000 : 2000
                        }),
                        signal: signal
                    });
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let buffer = "";
                    let fullResponse = "";
                    let thinking = isDeepThinking ? [] : null;
                    
                    const responseContent = document.getElementById('responseContent');
                    
                    // Process the stream
                    while (true) {
                        try {
                            const { done, value } = await reader.read();
                            if (done) break;
                            
                            buffer += decoder.decode(value, { stream: true });
                            
                            // Process complete lines in the buffer
                            let lines = buffer.split("\n");
                            buffer = lines.pop() || ""; // Keep the last incomplete line in the buffer
                            
                            for (const line of lines) {
                                if (line.startsWith("data: ")) {
                                    const data = line.substring(6);
                                    if (data === "[DONE]") continue;
                                    
                                    try {
                                        const parsedData = JSON.parse(data);
                                        if (parsedData.choices && parsedData.choices[0].delta.content) {
                                            const content = parsedData.choices[0].delta.content;
                                            fullResponse += content;
                                            
                                            // If deep thinking, try to extract thinking steps
                                            if (isDeepThinking && fullResponse.includes("思考步骤") && !fullResponse.includes("最终回答")) {
                                                const thinkingMatch = fullResponse.match(/思考步骤 \d+[：:] (.*?)(?=思考步骤 \d+[：:]|$)/gs);
                                                if (thinkingMatch) {
                                                    thinking = thinkingMatch.map(step => step.trim());
                                                }
                                            }
                                            
                                            // Update UI with the latest content
                                            responseContent.innerHTML = marked.parse(fullResponse);
                                            
                                            // Process code blocks to add syntax highlighting
                                            const codeBlocks = responseContent.querySelectorAll('pre');
                                            codeBlocks.forEach(block => {
                                                if (!block.classList.contains('code-block')) {
                                                    block.className = 'code-block relative';
                                                }
                                            });
                                            
                                            // Scroll to bottom
                                            chatContainer.scrollTop = chatContainer.scrollHeight;
                                        }
                                    } catch (e) {
                                        console.error("Error parsing stream data:", e);
                                    }
                                }
                            }
                        } catch (e) {
                            if (e.name === 'AbortError') {
                                console.log('Fetch aborted');
                                return { content: fullResponse, thinking: thinking, aborted: true };
                            } else {
                                throw e;
                            }
                        }
                    }
                    
                    return { content: fullResponse, thinking: thinking };
                } else {
                    // Non-streaming response
                    const response = await fetch(apiUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: model === "Jork-Trax-4" ? "deepseek-coder" : "deepseek-chat",
                            messages: messages,
                            temperature: 0.7,
                            stream: false,
                            max_tokens: isDeepThinking ? 4000 : 2000
                        }),
                        signal: signal
                    });
                    
                    const data = await response.json();
                    const content = data.choices[0].message.content;
                    
                    // Extract thinking steps if deep thinking was requested
                    let thinking = null;
                    if (isDeepThinking && content.includes("思考步骤")) {
                        const thinkingMatch = content.match(/思考步骤 \d+[：:] (.*?)(?=思考步骤 \d+[：:]|$)/gs);
                        if (thinkingMatch) {
                            thinking = thinkingMatch.map(step => step.trim());
                        }
                    }
                    
                    return { content, thinking };
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Fetch aborted');
                    return {
                        content: "生成已停止",
                        thinking: null,
                        aborted: true
                    };
                }
                
                console.error("DeepSeek API Error:", error);
                return {
                    content: `调用API时发生错误: ${error.message || '未知错误'}`,
                    thinking: null
                };
            }
        }
        
        // Stop generation function
        function stopGeneration() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
        }
        
        // Register handler for streaming responses with Poe API
        if (window.Poe) {
            window.Poe.registerHandler("streaming-handler", (result, context) => {
                const streamingElement = document.getElementById('streamingResponse');
                if (!streamingElement) return;
                
                // Get the first response (there should only be one)
                if (result.responses.length === 0) return;
                
                const msg = result.responses[0];
                const responseContent = document.getElementById('responseContent');
                
                if (msg.status === "error") {
                    responseContent.textContent = "Error: " + (msg.statusText || "Unknown error");
                    responseContent.classList.add("error");
                } else if (msg.status === "incomplete") {
                    // Update with partial content while streaming
                    responseContent.innerHTML = marked.parse(msg.content);
                    
                    // Process code blocks to add syntax highlighting
                    const codeBlocks = responseContent.querySelectorAll('pre');
                    codeBlocks.forEach(block => {
                        block.className = 'code-block relative';
                    });
                } else if (msg.status === "complete") {
                    // Finalize response
                    finalizeStreamingResponse(msg.content);
                }
                
                // Scroll to bottom
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }

                    setTimeout(() => {
                        copyButton.innerHTML = '<i class="far fa-clipboard"></i>';
                    }, 2000);
                });
            });
            
            // Set up regenerate button functionality
            regenerateButton.addEventListener('click', () => {
                // Remove the last assistant message from the UI
                const messages = chatView.querySelectorAll('.mb-8');
                if (messages.length >= 2) {
                    messages[messages.length - 1].remove(); // Remove controls
                    messages[messages.length - 2].remove(); // Remove message
                }
                
                // Remove the last assistant message from the current messages array
                currentMessages.pop();
                
                // Save updated chat history
                saveChat(currentMessages);
                
                // Get the last user message
                const lastUserMessage = currentMessages.filter(msg => msg.role === 'user').pop();
                
                if (lastUserMessage) {
                    // Get the current model
                    const model = getSelectedModel('replyModelSelector');
                    
                    // Regenerate response
                    appendStreamingResponse();
                    
                    // Change send button to stop button
                    const sendButton = document.getElementById('replySendButton');
                    sendButton.innerHTML = '<i class="fas fa-stop"></i>';
                    sendButton.classList.add('stop-generation');
                    sendButton.onclick = stopGenerationAndRestore;
                    
                    callDeepSeekAPI(lastUserMessage.content, model, false, false, currentMessages.slice(0, -1))
                        .then(response => {
                            // Restore send button
                            restoreSendButton();
                            
                            // Check if response was aborted
                            if (response.aborted) {
                                finalizeStreamingResponse(response.content + "\n\n*生成已停止*");
                            } else {
                                finalizeStreamingResponse(response.content, response.thinking);
                            }
                        })
                        .catch(error => {
                            // Restore send button
                            restoreSendButton();
                            
                            console.error('Error regenerating response:', error);
                            finalizeStreamingResponse('抱歉，重新生成回答时发生错误，请重试。');
                        });
                }
            });
        }
        
        // Streaming response handling with typing effect
        function appendStreamingResponse() {
            const chatView = document.getElementById('chatView');
            
            const messageContainer = document.createElement('div');
            messageContainer.className = 'mb-8';
            messageContainer.id = 'streamingResponse';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'markdown-content';
            messageContent.id = 'responseContent';
            
            // Add typing animation
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'ai-typing';
            messageContent.appendChild(typingIndicator);
            
            messageContainer.appendChild(messageContent);
            chatView.appendChild(messageContainer);
            
            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageContent;
        }
        
        function finalizeStreamingResponse(message, thinking = null) {
            const streamingContainer = document.getElementById('streamingResponse');
            if (!streamingContainer) return;
            
            // Remove the streaming container
            streamingContainer.remove();
            
            // Append the full message
            appendAssistantMessage(message, thinking);
        }
        
        // Get selected model value
        function getSelectedModel(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            const selectedOption = dropdown.querySelector('.dropdown-option.selected');
            return selectedOption.dataset.value;
        }
        
        // Map Jork models to DeepSeek models
        function mapModelToDeepSeekModel(jorkModel) {
            if (jorkModel === "Jork-Trax-4") {
                return "deepseek-coder";
            } else {
                return "deepseek-chat";
            }
        }
        
        // Function to restore send button after generation is complete
        function restoreSendButton() {
            const mainSendButton = document.getElementById('sendButton');
            const replySendButton = document.getElementById('replySendButton');
            
            // Restore main send button
            if (mainSendButton.classList.contains('stop-generation')) {
                mainSendButton.classList.remove('stop-generation');
                mainSendButton.innerHTML = '<i class="fas fa-arrow-up"></i>';
                mainSendButton.onclick = () => sendMessage(document.getElementById('userInput'));
            }
            
            // Restore reply send button
            if (replySendButton.classList.contains('stop-generation')) {
                replySendButton.classList.remove('stop-generation');
                replySendButton.innerHTML = '<i class="fas fa-arrow-up"></i>';
                replySendButton.onclick = () => sendMessage(document.getElementById('replyInput'));
            }
        }
        
        // Function to stop generation and restore send button
        function stopGenerationAndRestore() {
            stopGeneration();
            restoreSendButton();
        }
        
        // Send message handlers
        async function sendMessage(input, isWebSearch = false, isDeepThinking = false) {
            if (input.value.trim() === '') return;
            
            // Check if we have enough points
            if (!pointsSystem.usePoints(50)) {
                alert('您的积分不足，请等待下一个重置周期或使用兑换码获取更多积分。');
                return;
            }
            
            const message = input.value.trim();
            const jorkModel = (input.id === 'userInput') ? 
                getSelectedModel('modelSelector') : 
                getSelectedModel('replyModelSelector');
            
            // Hide initial view and show chat view
            document.getElementById('initialView').classList.add('hidden');
            document.getElementById('chatView').classList.remove('hidden');
            document.getElementById('bottomInputArea').classList.remove('hidden');
            
            // Get file attachments
            const filesSource = input.id === 'userInput' ? uploadedFiles.main : uploadedFiles.reply;
            const fileAttachments = [...filesSource];
            
            // Append user message with attachments
            appendUserMessage(message, false, fileAttachments);
            
            // Clear input and attachments
            input.value = '';
            filesSource.length = 0;
            document.getElementById(input.id === 'userInput' ? 'filePreviewArea' : 'replyFilePreviewArea').classList.add('hidden');
            document.getElementById(input.id === 'userInput' ? 'filePreviewArea' : 'replyFilePreviewArea').innerHTML = '';
            
            // Create streaming response container
            appendStreamingResponse();
            
            // Change send button to stop button
            const sendButton = input.id === 'userInput' ? 
                document.getElementById('sendButton') : 
                document.getElementById('replySendButton');
            
            sendButton.innerHTML = '<i class="fas fa-stop"></i>';
            sendButton.classList.add('stop-generation');
            sendButton.onclick = stopGenerationAndRestore;
            
            try {
                // Call DeepSeek API with previous messages for context
                const response = await callDeepSeekAPI(message, jorkModel, isWebSearch, isDeepThinking, currentMessages);
                
                // Restore send button
                restoreSendButton();
                
                // Check if response was aborted
                if (response.aborted) {
                    finalizeStreamingResponse(response.content + "\n\n*生成已停止*");
                } else {
                    // Update the UI with the response
                    finalizeStreamingResponse(response.content, response.thinking);
                }
            } catch (error) {
                // Restore send button
                restoreSendButton();
                
                console.error('Error calling API:', error);
                // Update with error message
                finalizeStreamingResponse(`抱歉，发生了错误：${error.message || '无法连接到服务'}`);
            }
        }
        
        // Send button handlers
        document.getElementById('sendButton').addEventListener('click', function() {
            sendMessage(document.getElementById('userInput'));
        });
        
        document.getElementById('replySendButton').addEventListener('click', function() {
            sendMessage(document.getElementById('replyInput'));
        });
        
        // Web search button
        document.getElementById('webSearchButton').addEventListener('click', function() {
            sendMessage(document.getElementById('replyInput'), true, false);
        });
        
        // Deep thinking button
        document.getElementById('deepThinkingButton').addEventListener('click', function() {
            sendMessage(document.getElementById('replyInput'), false, true);
        });
        
        // Enter key handlers
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && this.value.trim() !== '') {
                e.preventDefault();
                sendMessage(this);
            }
        });
        
        document.getElementById('replyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && this.value.trim() !== '') {
                e.preventDefault();
                sendMessage(this);
            }
        });
        
        // Category button click handlers
        document.querySelectorAll('.rounded-full').forEach(button => {
            button.addEventListener('click', function() {
                const category = this.textContent.trim();
                let prompt = "";
                
                if (category.includes('写作')) {
                    prompt = "我需要一些写作方面的帮助，可以给我一些写作技巧吗？";
                } else if (category.includes('学习')) {
                    prompt = "我想学习一个新技能，有什么高效的学习方法？";
                } else if (category.includes('编程')) {
                    prompt = "我是编程初学者，应该从哪种编程语言开始学习？";
                } else if (category.includes('生活问题')) {
                    prompt = "有什么提高日常生活效率的小技巧？";
                } else if (category.includes('Jork的选择')) {
                    const choices = [
                        "人工智能的发展历史是怎样的？",
                        "如何在工作中更有效地沟通？",
                        "有哪些值得推荐的科普书籍？",
                        "如何开始一个健康的生活方式？"
                    ];
                    prompt = choices[Math.floor(Math.random() * choices.length)];
                }
                
                document.getElementById('userInput').value = prompt;
                document.getElementById('sendButton').click();
            });
        });
        
        // Set up "Ask JorkAI" button
        document.getElementById('askJorkButton').addEventListener('click', function() {
            const selectedText = window.getSelection().toString().trim();
            if (selectedText) {
                // Set text in input field
                const replyInput = document.getElementById('replyInput');
                replyInput.value = `Jork，这段代码是什么意思？\n\n\`\`\`\n${selectedText}\n\`\`\``;
                
                // Make sure we're in chat view
                if (document.getElementById('initialView').classList.contains('hidden') === false) {
                    document.getElementById('initialView').classList.add('hidden');
                    document.getElementById('chatView').classList.remove('hidden');
                    document.getElementById('bottomInputArea').classList.remove('hidden');
                }
                
                // Send the message
                document.getElementById('replySendButton').click();
                
                // Hide the ask button
                hideAskButton();
            }
        });
        
        // Initialize canvas interaction
        setupCanvasInteraction();
        
        // Get references for easier access
        const chatContainer = document.getElementById('chatContainer');
    </script>
</body>
</html>
