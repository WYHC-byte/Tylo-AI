<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JorkAI 智能客服</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            max-width: 500px;
            width: 100%;
            height: 100%;
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .chat-header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 500;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
        }

        .status-dot.human {
            background: #3498db;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.customer {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }

        .message.bot .message-content,
        .message.agent .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message.customer .message-content {
            background: #2c3e50;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-content img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-content img:hover {
            transform: scale(1.02);
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .message.customer .message-time {
            text-align: right;
            color: #bbb;
        }

        .sender-name {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .transfer-human-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .transfer-human-btn:hover {
            background: #c0392b;
            transform: translateY(-1px);
        }

        .transfer-human-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 25px;
            padding: 8px 16px;
            transition: all 0.3s;
        }

        .input-group:focus-within {
            background: #e8e8e8;
        }

        #messageInput {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 15px;
            padding: 8px 0;
        }

        .input-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: rgba(0,0,0,0.05);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: #666;
        }

        .send-btn {
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: #34495e;
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 20px;
            padding-top: 0;
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .image-preview {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }

        .image-preview img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .image-preview.show {
            display: flex;
        }

        #imageInput {
            display: none;
        }

        /* 初始化提示 */
        .init-form {
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin: 20px;
        }

        .init-form h3 {
            margin-bottom: 16px;
            color: #2c3e50;
        }

        .init-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .init-form button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .init-form button:hover {
            background: #34495e;
        }

        /* AI消息标识 */
        .ai-badge {
            display: inline-block;
            background: #3498db;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            font-weight: 500;
        }

        .message.bot .sender-name {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-disclaimer {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 4px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 聊天头部 -->
        <div class="chat-header">
            <h2>JorkAI 智能客服</h2>
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">AI客服</span>
            </div>
        </div>

        <!-- 消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <!-- 初始化表单 -->
            <div class="init-form" id="initForm">
                <h3>欢迎使用 JorkAI 智能客服</h3>
                <p style="color: #666; font-size: 14px; margin-bottom: 16px;">我们将为您提供专业的技术支持和服务</p>
                <input type="text" id="customerName" placeholder="请输入您的姓名" required>
                <input type="email" id="customerEmail" placeholder="请输入您的邮箱" required>
                <button onclick="startChat()">开始对话</button>
            </div>
        </div>

        <!-- 输入状态指示器 -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            正在输入...
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-container" id="chatInputContainer" style="display: none;">
            <div class="input-actions">
                <button class="transfer-human-btn" id="transferBtn" onclick="transferToHuman()">
                    转人工客服
                </button>
            </div>
            <div class="input-wrapper">
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                    <div class="input-buttons">
                        <button class="btn" onclick="document.getElementById('imageInput').click()">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="btn send-btn" onclick="sendMessage()">发送</button>
            </div>
            <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
        </div>
    </div>

    <!-- 图片预览 -->
    <div class="image-preview" id="imagePreview" onclick="closeImagePreview()">
        <img id="previewImage" src="" alt="预览图片">
    </div>

    <script>
        // Supabase配置
        const SUPABASE_URL = 'https://msllaraotlkagudtxnnr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zbGxhcmFvdGxrYWd1ZHR4bm5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQwMDk0NzIsImV4cCI6MjA2OTU4NTQ3Mn0.5V3ldz1k8_LbPljfSRHzfrGhwPoKi3krBSlO7rWyw-I';
        const DEEPSEEK_API_KEY = 'sk-e1ed90c2effc4415beeee85845f66d05';
        const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';

        // 初始化Supabase客户端
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 全局变量
        let currentSessionId = null;
        let currentStatus = 'bot';
        let messageSubscription = null;

        // 开始聊天
        async function startChat() {
            const name = document.getElementById('customerName').value.trim();
            const email = document.getElementById('customerEmail').value.trim();

            if (!name || !email) {
                alert('请输入姓名和邮箱');
                return;
            }

            if (!validateEmail(email)) {
                alert('请输入有效的邮箱地址');
                return;
            }

            try {
                // 创建新会话
                const { data: session, error } = await supabase
                    .from('chat_sessions')
                    .insert({
                        customer_name: name,
                        customer_email: email,
                        status: 'bot'
                    })
                    .select()
                    .single();

                if (error) throw error;

                currentSessionId = session.id;
                
                // 隐藏初始化表单，显示聊天界面
                document.getElementById('initForm').style.display = 'none';
                document.getElementById('chatInputContainer').style.display = 'block';

                // 发送欢迎消息
                await addMessage('bot', `您好 ${name}！我是JorkAI的智能客服助手，我可以帮您解答关于JorkAI的功能、使用方法、技术问题等。请问有什么可以帮助您的吗？`);

                // 订阅消息更新
                subscribeToMessages();

            } catch (error) {
                console.error('创建会话失败:', error);
                alert('创建会话失败，请刷新页面重试');
            }
        }

        // 验证邮箱
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // 订阅消息更新
        function subscribeToMessages() {
            if (!currentSessionId) return;

            messageSubscription = supabase
                .channel(`messages:${currentSessionId}`)
                .on('postgres_changes', 
                    { 
                        event: 'INSERT', 
                        schema: 'public', 
                        table: 'messages',
                        filter: `session_id=eq.${currentSessionId}`
                    }, 
                    async (payload) => {
                        const message = payload.new;
                        // 只显示其他发送者的消息（避免重复显示自己的消息）
                        if (message.sender !== 'customer') {
                            displayMessage(message.sender, message.content, message.created_at, message.image_url);
                        }
                    }
                )
                .on('postgres_changes',
                    {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'chat_sessions',
                        filter: `id=eq.${currentSessionId}`
                    },
                    (payload) => {
                        const session = payload.new;
                        updateStatus(session.status);
                    }
                )
                .subscribe();
        }

        // 更新状态
        function updateStatus(status) {
            currentStatus = status;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const transferBtn = document.getElementById('transferBtn');

            if (status === 'human') {
                statusDot.classList.add('human');
                statusText.textContent = '人工客服';
                transferBtn.disabled = true;
                transferBtn.textContent = '已转人工';
            } else {
                statusDot.classList.remove('human');
                statusText.textContent = 'AI客服';
                transferBtn.disabled = false;
                transferBtn.textContent = '转人工客服';
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || !currentSessionId) return;

            // 清空输入框
            input.value = '';

            // 显示用户消息
            displayMessage('customer', message, new Date().toISOString());

            // 保存到数据库
            await addMessage('customer', message);

            // 如果是AI模式，调用DeepSeek
            if (currentStatus === 'bot') {
                showTypingIndicator();
                await callDeepSeekAPI(message);
                hideTypingIndicator();
            }
        }

        // 处理图片选择
        async function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file || !currentSessionId) return;

            // 检查文件大小
            if (file.size > 10 * 1024 * 1024) {
                alert('图片大小不能超过10MB');
                return;
            }

            try {
                // 显示上传中提示
                displayMessage('customer', '正在上传图片...', new Date().toISOString());

                // 上传到Supabase Storage
                const fileName = `${currentSessionId}/${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('chat-images')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 获取公开URL
                const { data: { publicUrl } } = supabase.storage
                    .from('chat-images')
                    .getPublicUrl(fileName);

                // 更新消息显示
                const messages = document.getElementById('chatMessages');
                const lastMessage = messages.lastElementChild;
                lastMessage.querySelector('.message-content').innerHTML = `<img src="${publicUrl}" alt="发送的图片" onclick="showImagePreview('${publicUrl}')">`;

                // 保存到数据库
                await addMessage('customer', '', publicUrl);

                // 如果是AI模式，发送图片描述请求
                if (currentStatus === 'bot') {
                    showTypingIndicator();
                    await callDeepSeekAPI('[用户发送了一张图片]');
                    hideTypingIndicator();
                }

            } catch (error) {
                console.error('上传图片失败:', error);
                alert('上传图片失败，请重试');
                // 移除上传中提示
                const messages = document.getElementById('chatMessages');
                messages.removeChild(messages.lastElementChild);
            }

            // 清空文件输入
            event.target.value = '';
        }

        // 添加消息到数据库
        async function addMessage(sender, content, imageUrl = null) {
            if (!currentSessionId) return;

            try {
                const { error } = await supabase
                    .from('messages')
                    .insert({
                        session_id: currentSessionId,
                        sender: sender,
                        content: content || '',
                        message_type: imageUrl ? 'image' : 'text',
                        image_url: imageUrl
                    });

                if (error) throw error;

                // 更新会话最后活动时间
                await supabase
                    .from('chat_sessions')
                    .update({ last_activity: new Date().toISOString() })
                    .eq('id', currentSessionId);

            } catch (error) {
                console.error('保存消息失败:', error);
            }
        }

        // 调用DeepSeek API
        async function callDeepSeekAPI(userMessage) {
            try {
                const response = await fetch(DEEPSEEK_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            {
                                role: 'system',
                                content: `你是JorkAI的专业客服助手。JorkAI是一个先进的AI服务平台。

你的职责是：
1. 解答用户关于JorkAI的功能、使用方法、技术问题
2. 帮助用户解决遇到的问题
3. 提供专业、友好的服务
4. 如果遇到复杂的技术问题或账户问题，建议用户转接人工客服

回答原则：
- 使用简洁、清晰、专业的语言
- 主动提供解决方案
- 保持友好和耐心
- 不确定的信息不要编造，建议转人工处理`
                            },
                            {
                                role: 'user',
                                content: userMessage
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 500,
                        stream: true
                    })
                });

                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // 显示AI回复
                displayMessage('bot', aiResponse, new Date().toISOString());
                await addMessage('bot', aiResponse);

            } catch (error) {
                console.error('DeepSeek API错误:', error);
                const errorMessage = '抱歉，AI服务暂时不可用。您可以选择转接人工客服。';
                displayMessage('bot', errorMessage, new Date().toISOString());
                await addMessage('bot', errorMessage);
            }
        }

        // 显示消息
        function displayMessage(sender, content, timestamp, imageUrl = null) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            let senderName = '';
            let aiBadge = '';
            let aiDisclaimer = '';
            
            if (sender === 'bot') {
                senderName = 'JorkAI 客服';
                aiBadge = '<span class="ai-badge">AI</span>';
                aiDisclaimer = '<div class="ai-disclaimer">此回复由AI自动生成，如需人工协助请点击"转人工客服"</div>';
            } else if (sender === 'agent') {
                senderName = '人工客服';
            }

            const messageContent = imageUrl 
                ? `<img src="${imageUrl}" alt="图片" onclick="showImagePreview('${imageUrl}')">`
                : content;

            messageDiv.innerHTML = `
                <div>
                    ${sender !== 'customer' ? `<div class="sender-name">${senderName}${aiBadge}</div>` : ''}
                    <div class="message-content">
                        ${messageContent}
                        ${sender === 'bot' && !imageUrl ? aiDisclaimer : ''}
                    </div>
                    <div class="message-time">${formatTime(timestamp)}</div>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 转人工客服
        async function transferToHuman() {
            if (!currentSessionId || currentStatus === 'human') return;

            if (confirm('确定要转接人工客服吗？')) {
                try {
                    // 更新会话状态
                    const { error } = await supabase
                        .from('chat_sessions')
                        .update({ status: 'human' })
                        .eq('id', currentSessionId);

                    if (error) throw error;

                    // 发送系统消息
                    const message = '已为您转接JorkAI人工客服，请稍等片刻...';
                    displayMessage('bot', message, new Date().toISOString());
                    await addMessage('bot', message);

                    updateStatus('human');

                } catch (error) {
                    console.error('转接失败:', error);
                    alert('转接失败，请重试');
                }
            }
        }

        // 显示/隐藏输入指示器
        function showTypingIndicator() {
            document.getElementById('typingIndicator').classList.add('show');
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').classList.remove('show');
        }

        // 图片预览
        function showImagePreview(url) {
            document.getElementById('previewImage').src = url;
            document.getElementById('imagePreview').classList.add('show');
        }

        function closeImagePreview() {
            document.getElementById('imagePreview').classList.remove('show');
        }

        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (messageSubscription) {
                messageSubscription.unsubscribe();
            }
        });
    </script>
</body>
</html>
